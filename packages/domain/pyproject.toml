[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cpq-domain"
version = "0.1.0"
description = "Domain models and business logic for the NextGen CPQ quoting system"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6"
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["cpq_domain*"]
